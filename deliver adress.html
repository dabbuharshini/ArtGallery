<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Delivery Address - ARTEM</title>
    <style>
        /* same styling as before */
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f7f7f7;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        p {
            margin-top: 20px;
            font-size: 16px;
            color: #555;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #2e86de;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #1b4f72;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enter Delivery Address</h2>
        <form id="delivery-form">
            <label for="fullname">Full Name *</label>
            <input type="text" id="fullname" name="fullname" required />

            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10-digit number" required />

            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required />

            <label for="address">Street Address *</label>
            <textarea id="address" name="address" rows="3" required></textarea>

            <label for="city">City *</label>
            <input type="text" id="city" name="city" required />

            <label for="state">State / Province *</label>
            <input type="text" id="state" name="state" required />

            <label for="zip">ZIP / Postal Code *</label>
            <input type="text" id="zip" name="zip" required />

            <p><strong>Payment Method:</strong> Cash on Delivery</p>

            <button type="submit">Confirm & Proceed</button>
        </form>
    </div>

    <script>
        document.getElementById('delivery-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = {
                fullname: this.fullname.value.trim(),
                phone: this.phone.value.trim(),
                email: this.email.value.trim(),
                address: this.address.value.trim(),
                city: this.city.value.trim(),
                state: this.state.value.trim(),
                zip: this.zip.value.trim()
            };

            alert(`Thank you, ${formData.fullname}! Your order will be delivered to:\n
${formData.address}, ${formData.city}, ${formData.state} - ${formData.zip}\n
Contact: ${formData.phone}, Email: ${formData.email}\n
Payment Method: Cash on Delivery`);

            localStorage.removeItem('cartItems');
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html>
