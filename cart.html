<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products--ARTEM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" 
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
    .cart-item {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 10px;
    }
    .cart-item img {
        border-radius: 5px;
    }
    #close-cart {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 24px;
        cursor: pointer;
        color: #333;
        transition: color 0.3s ease;
    }

    #close-cart:hover {
        color: red;
    }
    .remove-btn {
        margin-top: 10px;
        padding: 5px 10px;
        background-color: crimson;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .remove-btn:hover {
        background-color: darkred;
    }
    .btn-go-back {
        text-decoration: none;
        padding: 6px 12px;
        background-color: cadetblue;
        color: #333;
        border-radius: 5px;
        font-weight: bold;
        border: 1px solid black;
        transition: background-color 0.3s ease;
    }

    .btn-go-back:hover {
        background-color: blueviolet;
    }
    .qty-btn {
        margin: 0 5px;
        padding: 2px 8px;
        font-size: 16px;
        background-color: #e0e0e0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .qty-btn:hover {
        background-color: #ccc;
    }
    </style>
</head>
<body>
<section>
    <h2 class="title">SHOPPING CART</h2>
    <div class="cart">
        <div class="cart-content"></div>
        <div class="cart-total">
            <h3>Cart Total: Rs. <span id="cart-total">0</span></h3>
        </div>
        <a href="deliver adress.html"><button type="button" class="btn-buy" id="pay-now-btn" disabled>Pay Now</button></a>
        <div style="display: flex; justify-content: flex-end; gap: 20px; margin: 10px 20px 0 0;">
            <a href="products.html" class="btn-go-back">← Continue Shopping</a>
            <i class="fa-solid fa-xmark" id="close-cart" title="Clear Cart"></i>
        </div>

    </div>
</section>
<footer>
    <div class="row1">
        <div class="coll">
            <img src="logo.png" class="logo">
            <p><b>ARTEM is used for collecting and showcasing Arts</b>
                <br>where innovation meets inspiration<br>
                Evaluate your experience with Arts</p>
        </div>
        <div class="coll">
            <h3>Links</h3>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="contact.html">Contact us</a></li>
            </ul>
        </div>
        <div class="coll">
            <h3>Newsletter</h3>
            <form>
                <input type="email" placeholder="Enter your email id" required>
                <button type="submit">&#8594;</button>
            </form>
            <div class="social-icons">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-whatsapp"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-snapchat"></i>
            </div>
        </div>
    </div> 
</footer>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const cartContent = document.querySelector(".cart-content");
    const cartTotal = document.getElementById("cart-total");
    const payNowBtn = document.getElementById("pay-now-btn");

    let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];

    function renderCart() {
        cartContent.innerHTML = "";
        let total = 0;

        if(cartItems.length === 0) {
            // Disable pay button if no items
            payNowBtn.disabled = true;
            payNowBtn.style.cursor = "not-allowed";
            payNowBtn.title = "Add items to cart to enable payment";
        } else {
            payNowBtn.disabled = false;
            payNowBtn.style.cursor = "pointer";
            payNowBtn.removeAttribute("title");
        }

        cartItems.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            const cartItemDiv = document.createElement("div");
            cartItemDiv.classList.add("cart-item");
            cartItemDiv.innerHTML = `
                <img src="${item.img}" alt="Product" width="80">
                <div>
                    <p>Price: Rs. ${item.price}</p>
                    <div>
                        Quantity:
                        <button class="qty-btn decrease" data-index="${index}">−</button>
                        <span class="qty">${item.quantity}</span>
                        <button class="qty-btn increase" data-index="${index}">+</button>
                    </div>
                    <p>Total: Rs. ${itemTotal.toFixed(2)}</p>
                    <button class="remove-btn" data-index="${index}">Remove</button>
                </div>
            `;
            cartContent.appendChild(cartItemDiv);
        });

        cartTotal.textContent = total.toFixed(2);

        document.querySelectorAll(".remove-btn").forEach(button => {
            button.addEventListener("click", function () {
                const index = parseInt(this.getAttribute("data-index"));
                cartItems.splice(index, 1);
                localStorage.setItem("cartItems", JSON.stringify(cartItems));
                renderCart();
            });
        });
        document.querySelectorAll(".qty-btn").forEach(button => {
            button.addEventListener("click", function () {
                const index = parseInt(this.getAttribute("data-index"));
                if (this.classList.contains("increase")) {
                    cartItems[index].quantity++;
                } else if (this.classList.contains("decrease") && cartItems[index].quantity > 1) {
                    cartItems[index].quantity--;
                }
                localStorage.setItem("cartItems", JSON.stringify(cartItems));
                renderCart();
            });
        });
    }

    const closeCartIcon = document.getElementById("close-cart");
    closeCartIcon.addEventListener("click", function () {
        if (confirm("Are you sure you want to clear the cart?")) {
            localStorage.removeItem("cartItems");
            cartItems = [];
            renderCart();
        }
    });

    renderCart();
});
</script>
<script src="updateCartIcon.js"></script>
</body>
</html>
